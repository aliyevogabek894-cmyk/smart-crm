<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Smart CRM - Tizim Tozalash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #38bdf8; margin-bottom: 20px; font-size: 1.5rem; }
        .status { 
            background: #1e293b; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .status h3 { color: #38bdf8; margin-bottom: 8px; }
        .ok { border-left: 4px solid #10b981; }
        .err { border-left: 4px solid #ef4444; }
        .data-box {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            word-break: break-all;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button:hover { background: #2563eb; }
        .danger { background: #ef4444; }
        .success { background: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-wrench me-2"></i> Smart CRM - Diagnostika</h1>
        
        <div class="status" id="step1">
            <h3><i class="fas fa-hdd me-2"></i> localStorage holati</h3>
            <div id="localStatus">Tekshirilmoqda...</div>
        </div>

        <div class="status" id="step2">
            <h3><i class="fas fa-database me-2"></i> Firebase ma'lumotlari</h3>
            <div id="firebaseStatus">Yuklanmoqda...</div>
        </div>

        <div class="status" id="step3">
            <h3><i class="fas fa-users me-2"></i> Firebase'dagi sinflar va o'quvchilar</h3>
            <div class="data-box" id="firebaseData">Kutilmoqda...</div>
        </div>

        <button class="danger" onclick="clearAndRedirect()">
            <i class="fas fa-broom me-2"></i> Hammasini tozalab, saytga o'tish
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBOEZGzczHy9njwXDtNA7TlM-vEzngbFDw",
            authDomain: "domla-aliyev.firebaseapp.com",
            projectId: "domla-aliyev",
            storageBucket: "domla-aliyev.firebasestorage.app",
            messagingSenderId: "762189436245",
            appId: "1:762189436245:web:78132d7e3e036b942d4bdc"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Step 1: Check localStorage
        const localStudents = localStorage.getItem('smart_students');
        const localClasses = localStorage.getItem('smart_classes');
        const step1El = document.getElementById('step1');
        const localStatusEl = document.getElementById('localStatus');
        
        if (localStudents || localClasses) {
            step1El.classList.add('err');
            const s = JSON.parse(localStudents || '[]');
            const c = JSON.parse(localClasses || '[]');
            localStatusEl.innerHTML = `<i class="fas fa-exclamation-triangle text-warning"></i> <b>localStorage da eski ma'lumot bor!</b><br>
                O'quvchilar: ${s.length} ta<br>
                Sinflar: ${c.join(', ') || 'yo\'q'}<br>
                <br><b>Bu ma'lumot Firebase ustiga yozilishi mumkin edi!</b>`;
        } else {
            step1El.classList.add('ok');
            localStatusEl.innerHTML = '<i class="fas fa-check-circle text-success"></i> localStorage toza - muammo yo\'q';
        }

        // Step 2 & 3: Check Firebase
        db.collection("crmData").doc("main").get().then(doc => {
            const step2El = document.getElementById('step2');
            const firebaseStatusEl = document.getElementById('firebaseStatus');
            const firebaseDataEl = document.getElementById('firebaseData');
            
            if (doc.exists) {
                const data = doc.data();
                const students = data.students || [];
                const classes = data.classes || [];
                
                step2El.classList.add('ok');
                firebaseStatusEl.innerHTML = `<i class="fas fa-check-circle text-success"></i> Firebase'da ma'lumot bor!<br>
                    O'quvchilar: <b>${students.length}</b> ta<br>
                    Sinflar: <b>${classes.join(', ')}</b>`;
                
                let details = `<b>SINFLAR:</b> ${classes.join(', ')}\n\n`;
                classes.forEach(cls => {
                    const clsStudents = students.filter(s => s.classGroup === cls);
                    details += `\n<b><i class="fas fa-book"></i> ${cls} sinfi (${clsStudents.length} ta):</b>\n`;
                    clsStudents.forEach(s => {
                        details += `  <i class="fas fa-user"></i> ${s.firstName} ${s.lastName} - ${s.phone}\n`;
                    });
                });
                
                firebaseDataEl.innerHTML = details.replace(/\n/g, '<br>');
            } else {
                step2El.classList.add('err');
                firebaseStatusEl.innerHTML = '<i class="fas fa-times-circle text-danger"></i> Firebase\'da hech narsa yo\'q!';
                firebaseDataEl.innerHTML = 'Ma\'lumot topilmadi';
            }
        }).catch(e => {
            document.getElementById('firebaseStatus').innerHTML = '<i class="fas fa-times-circle text-danger"></i> Xatolik: ' + e.message;
        });

        // Clear everything and redirect
        function clearAndRedirect() {
            localStorage.clear();
            sessionStorage.clear();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    regs.forEach(r => r.unregister());
                });
            }
            
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(n => caches.delete(n));
                });
            }
            
            alert('Tozalandi! Endi asosiy saytga o\'tamiz.');
            window.location.href = 'index.html?v=' + Date.now();
        }
    </script>
</body>
</html>
